<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0E0D0C" />
<meta name="robots" content="noindex" />
<title>Thank You | The Gym</title>
<link rel="icon" href="assets/favicon.png" sizes="256x256" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Oswald:wght@500;600&family=Poppins:wght@400;500&family=Caveat:wght@700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(120% 90% at 50% -10%,rgba(196,98,44,.28),transparent 55%),#0E0D0C;
    color:#EFE4D0;font-family:'Poppins',system-ui,sans-serif;min-height:100vh;min-height:100svh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.6}
  .box{max-width:560px}
  .badge{width:170px;margin:0 auto 26px}
  h1{font-family:'Goldman','Arial Black',sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(2rem,7vw,3rem);
    line-height:1;letter-spacing:1px;margin-bottom:6px}
  .script{font-family:'Caveat',cursive;color:#E07B33;font-size:1.7rem;display:block;margin-bottom:18px}
  p{color:#C7BCA7;font-size:1.06rem;margin-bottom:30px}
  a.btn{display:inline-flex;align-items:center;justify-content:center;background:#C4622C;color:#fff;
    font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
    padding:15px 32px;border-radius:4px;min-height:50px;transition:background .15s ease,transform .15s ease}
  a.btn:hover{background:#E07B33;transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <div class="badge">
      <img src="assets/logo.png" width="1500" height="1000" alt="The Gym" style="width:100%;height:auto" />
    </div>
    <h1>Thank You</h1>
    <span class="script">Come as you are. Keep becoming.</span>
    <p>Thanks for reaching out to The Gym. We'll get back to you soon. Ready to get started now? You can sign up online anytime. We can't wait to meet you.</p>
    <a class="btn" href="/">Back to Home</a>
  </div>
</body>
</html>
